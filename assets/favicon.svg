<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b4fbf"/>
      <stop offset="100%" stop-color="#4a2d75"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#e0d6f0"/>
    </linearGradient>
  </defs>
  <!-- back cover -->
  <rect x="10" y="8" width="40" height="48" rx="3" fill="url(#cover)" opacity="0.7"/>
  <!-- pages -->
  <rect x="14" y="10" width="36" height="44" rx="2" fill="url(#pages)"/>
  <!-- page lines -->
  <line x1="20" y1="22" x2="42" y2="22" stroke="#c0b3d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="28" x2="42" y2="28" stroke="#c0b3d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="34" x2="38" y2="34" stroke="#c0b3d8" stroke-width="1.2" stroke-linecap="round"/>
  <!-- front cover -->
  <rect x="8" y="6" width="40" height="48" rx="3" fill="url(#cover)"/>
  <!-- spine highlight -->
  <rect x="8" y="6" width="5" height="48" rx="2" fill="#5e3a94" opacity="0.6"/>
  <!-- heart decoration -->
  <path d="M28 24 C28 20, 22 18, 22 24 C22 28, 28 32, 28 32 C28 32, 34 28, 34 24 C34 18, 28 20, 28 24Z" fill="#e8a0c8" opacity="0.9"/>
  <!-- sparkles -->
  <circle cx="18" cy="16" r="1.5" fill="#f0d0ff" opacity="0.8"/>
  <circle cx="40" cy="14" r="1" fill="#f0d0ff" opacity="0.6"/>
  <circle cx="42" cy="44" r="1.2" fill="#f0d0ff" opacity="0.7"/>
</svg>
